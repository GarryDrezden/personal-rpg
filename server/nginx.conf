worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    server {
        listen       8080;
        server_name  localhost;

        # Путь к проекту — замените при необходимости
        set $project_root E:/Работа/OSPanel/domains/personal-rpg;

        root $project_root/dist;
        index index.html;

        location /api {
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_index  index.php;
            include        fastcgi_params;
            fastcgi_param  SCRIPT_FILENAME $project_root/api/index.php;
            fastcgi_param  REQUEST_URI $request_uri;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
