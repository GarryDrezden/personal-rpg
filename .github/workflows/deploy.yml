name: Deploy to hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Prepare FTP paths
        run: |
          DIR="${{ secrets.FTP_SERVER_DIR }}"
          if [[ "$DIR" != */ ]]; then
            DIR="${DIR}/"
          fi
          echo "FTP_SERVER_DIR=$DIR" >> "$GITHUB_ENV"

      - run: npm ci
      - run: npm run build

      - name: Prepare deploy bundle
        run: |
          rm -rf deploy-bundle
          mkdir -p deploy-bundle/api
          cp -r dist/. deploy-bundle/
          cp -r api/. deploy-bundle/api/
          cp .htaccess deploy-bundle/

      - name: Verify deploy bundle (no repo source on server)
        run: |
          test ! -d deploy-bundle/src
          test ! -f deploy-bundle/package.json
          test ! -d deploy-bundle/docs
          echo "Bundle OK:"
          ls -la deploy-bundle | head -20

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy-bundle/
          server-dir: ${{ env.FTP_SERVER_DIR }}
          state-name: .ftp-deploy-sync-state-v2.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            data/**
            **/*.sqlite
            api/config/config.php
            .deploy-staging/**
            deploy-bundle/**
